# This AWS SAM template has been generated from your function's configuration. If
# your function has one or more triggers, note that the AWS resources associated
# with these triggers aren't fully specified in this template and include
# placeholder values. Open this template in AWS Infrastructure Composer or your
# favorite IDE and modify it to specify a serverless application with other AWS
# resources.
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: An AWS Serverless Application Model template describing your function.
Resources:
  frauddetectionlambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./src
      Description: ''
      MemorySize: 128
      Timeout: 3
      Handler: fraud_detection_lambda.lambda_handler
      Runtime: python3.12
      Architectures:
        - x86_64
      EphemeralStorage:
        Size: 512
      Environment:
        Variables:
          BUCKET_NAME: finalproject-fraud-detection
          ENDPOINT_NAME: sagemaker-xgboost-2026-03-10-19-39-20-161
          PREDICTION_PREFIX: predictions/
      EventInvokeConfig:
        MaximumEventAgeInSeconds: 21600
        MaximumRetryAttempts: 2
      PackageType: Zip
      Policies:
        - Statement:
            - Sid: InvokeSageMakerEndpoint
              Effect: Allow
              Action:
                - sagemaker:InvokeEndpoint
              Resource: arn:aws:sagemaker:us-east-1:998754722171:endpoint/*
            - Sid: PublishCustomCloudWatchMetrics
              Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
            - Sid: WritePredictionsToS3
              Effect: Allow
              Action:
                - s3:PutObject
              Resource: arn:aws:s3:::finalproject-fraud-detection/predictions/*
            - Effect: Allow
              Action:
                - kinesis:GetRecords
                - kinesis:GetShardIterator
                - kinesis:DescribeStream
                - kinesis:DescribeStreamSummary
                - kinesis:ListShards
                - kinesis:ListStreams
              Resource:
                - !GetAtt KinesisStream1.Arn
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
              Resource: arn:aws:logs:us-east-1:998754722171:*
            - Effect: Allow
              Action:
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource:
                - >-
                  arn:aws:logs:us-east-1:998754722171:log-group:/aws/lambda/fraud-detection-lambda:*
            - Effect: Allow
              Action:
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'
            - Effect: Allow
              Action:
                - kinesis:DescribeStream
                - kinesis:DescribeStreamSummary
                - kinesis:GetRecords
                - kinesis:GetShardIterator
                - kinesis:ListShards
                - kinesis:ListStreams
                - kinesis:SubscribeToShard
                - logs:CreateLogGroup
                - logs:CreateLogStream
                - logs:PutLogEvents
              Resource: '*'
            - Effect: Allow
              Action:
                - s3:*
                - s3-object-lambda:*
              Resource: '*'
      RecursiveLoop: Terminate
      SnapStart:
        ApplyOn: None
      Events:
        Kinesis1:
          Type: Kinesis
          Properties:
            Stream:
              Fn::GetAtt:
                - KinesisStream1
                - Arn
            StartingPosition: LATEST
            BatchSize: 100
      RuntimeManagementConfig:
        UpdateRuntimeOn: Auto
  KinesisStream1:
    Type: AWS::Kinesis::Stream
    Properties:
      Name: KinesisStream1
      StreamEncryption:
        EncryptionType: KMS
        KeyId:
          Fn::GetAtt:
            - KMSKeyForKinesisStream1
            - Arn
  KMSKeyForKinesisStream1:
    Type: AWS::KMS::Key
